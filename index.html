<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice & Cards Idle</title>

  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 32px 16px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 24px;
    }

    .panel {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .label {
      color: #bbb;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
    }

    .small {
      margin-top: 8px;
      color: #ccc;
      font-size: 14px;
    }

    button {
      background: #6a1b9a;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      opacity: 0.95;
    }

    button:active {
      transform: scale(0.98);
    }

    .dice-area {
      display: flex;
      justify-content: center;
      margin: 20px 0 12px;
    }

    .die {
      width: 84px;
      height: 84px;
      border: 2px solid #444;
      border-radius: 16px;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: bold;
      color: #fff;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.35);
      user-select: none;
    }

    .cards {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      width: 160px;
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dice & Cards Idle</h1>

    <div class="panel">
      <div class="label">Ouro</div>
      <div class="value" id="gold">0</div>

      <div class="dice-area">
        <div class="die" id="dieDisplay">-</div>
      </div>

      <p>Última rolagem: <span id="lastRoll">-</span></p>
      <p>Resultado final: <span id="result">-</span></p>

      <button id="rollButton">Rolar todos</button>
      <div class="small">Protótipo 0.2</div>
    </div>

    <div class="panel">
      <h2>Cartas Ativas</h2>
      <div class="cards">
        <div class="card">
          <strong>Sorte</strong>
          <p>+1 em toda rolagem</p>
        </div>

        <div class="card">
          <strong>Crítico</strong>
          <p>Se cair no máximo, dobra</p>
        </div>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
