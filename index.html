<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice & Cards Idle</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1 class="title">Dice & Cards Idle</h1>

    <section class="panel main-panel">
      <div class="gold-box">
        <span class="label">Ouro</span>
        <strong id="goldValue">0</strong>
      </div>

      <div class="roll-summary-area">
        <div id="rollSlotsPreview" class="roll-slots-preview"></div>
      </div>

      <div id="rollGain" class="roll-gain">+0 ouro</div>

      <div class="actions">
        <button id="rollButton" class="btn btn-primary">Rolar</button>
        <a href="./shop.html" class="btn btn-secondary">Loja</a>
      </div>

      <div class="version">Protótipo 0.3</div>
    </section>

    <section class="build-sections">
      <section class="panel build-panel">
        <div class="section-header">
          <h2>Dados Ativos</h2>
          <span class="section-subtitle">Todos os dados equipados rolam juntos</span>
        </div>

        <div id="diceSlots" class="dice-slots"></div>
      </section>

      <section class="panel build-panel">
        <div class="section-header">
          <h2>Cartas Ativas</h2>
          <span class="section-subtitle">Até 5 cartas equipadas</span>
        </div>

        <div id="cardSlots" class="card-slots"></div>
      </section>
    </section>
  </main>

  <div id="equipModal" class="modal hidden">
    <div class="modal-backdrop" data-close-modal="true"></div>

    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Equipar</h3>
        <button id="closeModalButton" class="modal-close" aria-label="Fechar">×</button>
      </div>

      <div id="modalList" class="modal-list"></div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
