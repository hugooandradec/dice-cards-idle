<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice & Cards Idle</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1 class="title">Dice & Cards Idle</h1>

    <section class="panel top-panel">
      <div class="gold-box">
        <span class="label">Ouro</span>
        <strong id="goldValue">0</strong>
      </div>

      <div class="roll-summary-area">
        <div id="rollSlotsPreview" class="roll-slots-preview"></div>
      </div>

      <div id="rollGain" class="roll-gain">+0 ouro</div>

      <div class="actions">
        <button id="rollButton" class="btn btn-primary">Rolar</button>
        <a href="./shop.html" class="btn btn-secondary">Loja</a>
        <a href="./inventory.html" class="btn btn-secondary">Inventário</a>
      </div>

      <div class="version">Protótipo 0.3</div>
    </section>

    <section class="panel table-panel">
      <div class="table-area">
        <div class="loadout-section">
          <h2 class="loadout-title">🎲 Dados</h2>
          <div id="diceSlots" class="slot-row"></div>
        </div>

        <div class="felt-divider"></div>

        <div class="loadout-section">
          <h2 class="loadout-title">🃏 Cartas</h2>
          <div id="cardSlots" class="slot-row card-row"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="equipModal" class="modal hidden">
    <div class="modal-backdrop" data-close-modal="true"></div>

    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Equipar</h3>
        <button id="closeModalButton" class="modal-close" aria-label="Fechar">×</button>
      </div>

      <div id="modalList" class="modal-list"></div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
