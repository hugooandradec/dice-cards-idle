<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice & Cards Idle</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <meta name="theme-color" content="#6a1b9a" />
</head>
<body>
  <div class="container">
    <h1>Dice & Cards Idle</h1>

    <div class="card main-card">
      <div class="ouro-area">
        <p>Ouro</p>
        <h2 id="gold">0</h2>
      </div>

      <div id="dice" class="dice">1</div>

      <p class="gain-line">
        <span id="gainText">+0 ouro</span>
      </p>

      <div class="main-actions">
        <button id="rollBtn" class="main-btn">Rolar</button>
        <button id="shopBtn" class="secondary-btn">Loja</button>
      </div>

      <p class="version">Protótipo 0.3</p>
    </div>

    <div class="card">
      <h2>Cartas Ativas</h2>

      <div class="card-slots">
        <div class="slot" id="slot1">Slot 1</div>

        <div class="slot locked" id="slot2">
          Slot 2
          <br />
          <span>150 ouro</span>
        </div>

        <div class="slot locked" id="slot3">
          Slot 3
          <br />
          <span>400 ouro</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
